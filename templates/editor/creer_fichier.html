<!-- templates/editor/creer_fichier.html -->

{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-file-plus"></i> Nouveau fichier</h1>
    <p class="subtitle">Dans le dossier : <strong>{{ dossier.nom }}</strong></p>
    
    <form method="post">
        {% csrf_token %}
        <input type="text" name="titre" placeholder="Titre du fichier (ex: Cours 1, Exercices...)" required autofocus>
        <button type="submit" class="btn-primary" style="width:100%">Créer le fichier</button>
        <div class="form-actions">
            <a href="{% url 'dossier_detail' path=dossier.get_full_path %}" class="btn-primary btn-outline" style="width:100%">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
