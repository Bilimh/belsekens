{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}

{% block content %}
<div class="form-container">
    <h1><i class="fas fa-edit"></i> Renommer le dossier</h1>
    <p class="subtitle">Dossier actuel : <strong>{{ dossier.nom }}</strong></p>
    
    <form method="post">
        {% csrf_token %}
        <input type="text" name="nom" value="{{ dossier.nom }}" required autofocus>
        <button type="submit" class="btn-primary" style="width:100%">Renommer</button>
        <div class="form-actions">
            <a href="{% url 'dossier_detail' dossier.slug %}" class="btn-primary btn-outline" style="width:100%">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
