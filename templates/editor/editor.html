{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Belsekens - Éditeur</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ... tes styles ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .explorer {
            width: 280px;
            background: #252526;
            color: #ccc;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3c3c3c;
        }
        .explorer-header {
            padding: 12px 16px;
            border-bottom: 1px solid #3c3c3c;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            background: #2d2d2d;
        }
        .explorer-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .tree-item {
            padding: 4px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .tree-item:hover { background: #2a2d2e; }
        .tree-item.active { background: #094771; }
        .tree-item .icon { width: 20px; }
        .tree-item.folder .icon { color: #dcb67a; }
        .tree-item.file .icon { color: #519aba; }
        .tree-item .label { flex: 1; }
        .explorer-footer {
            padding: 12px;
            border-top: 1px solid #3c3c3c;
            display: flex;
            gap: 8px;
        }
        .explorer-footer button {
            flex: 1;
            padding: 6px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .explorer-footer button:hover { background: #1177bb; }
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
        }
        .editor-header {
            background: #2d2d2d;
            padding: 8px 16px;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-title {
            color: #ccc;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-title i { color: #519aba; }
        .editor-actions button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .workspace {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2d2d2d;
            padding: 24px;
            border-radius: 8px;
            width: 400px;
            color: #ccc;
        }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal-buttons .confirm { background: #0e639c; color: white; }
        .modal-buttons .cancel { background: #555; color: white; }
        .empty-editor {
            text-align: center;
            color: #999;
            margin-top: 50px;
        }
        .empty-editor i {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="explorer">
        <div class="explorer-header"><i class="fas fa-folder-open"></i> EXPLORATEUR</div>
        <div class="explorer-content" id="tree-container">Chargement...</div>
        <div class="explorer-footer">
            <button id="btn-new-dossier"><i class="fas fa-folder-plus"></i> Dossier</button>
            <button id="btn-new-fichier"><i class="fas fa-file-plus"></i> Fichier</button>
        </div>
    </div>

    <div class="editor-panel">
        <div class="editor-header">
            <div class="file-title" id="file-title"><i class="fas fa-file"></i><span>Aucun fichier ouvert</span></div>
            <div class="editor-actions"><button id="btn-save"><i class="fas fa-save"></i> Sauvegarder</button></div>
        </div>
        <div id="workspace" class="workspace">
            <div class="empty-editor"><i class="fas fa-folder-open"></i><p>Sélectionnez ou créez un fichier</p></div>
        </div>
    </div>

    <div id="modal-dossier" class="modal"><div class="modal-content"><h3><i class="fas fa-folder-plus"></i> Nouveau dossier</h3><input type="text" id="dossier-nom" placeholder="Nom du dossier"><div class="modal-buttons"><button class="cancel" id="cancel-dossier">Annuler</button><button class="confirm" id="confirm-dossier">Créer</button></div></div></div>
    <div id="modal-fichier" class="modal"><div class="modal-content"><h3><i class="fas fa-file-plus"></i> Nouveau fichier</h3><input type="text" id="fichier-nom" placeholder="Nom du fichier"><div class="modal-buttons"><button class="cancel" id="cancel-fichier">Annuler</button><button class="confirm" id="confirm-fichier">Créer</button></div></div></div>

    <script type="module">
        import { renderDocument } from "{% static 'js/editor/documentRenderer.js' %}";
        import { syncBlocksFromDOM } from "{% static 'js/editor/editorState.js' %}";
        import { setupGlobalUnselect } from "{% static 'js/editor/selection.js' %}";

        // ========== ÉTAT ==========
        let currentDossier = null;
        let currentFichier = null;
        let arborescence = [];
        let csrfToken = null;

        setupGlobalUnselect();

        // ========== RÉCUPÉRATION DU TOKEN CSRF ==========
        async function fetchCsrfToken() {
            try {
                const response = await fetch('/api/csrf/');
                const data = await response.json();
                csrfToken = data.csrftoken;
                console.log('✅ CSRF token récupéré');
            } catch (error) {
                console.error('❌ Erreur récupération CSRF:', error);
            }
        }

        // ========== API ==========
        async function apiGet(url) {
            const res = await fetch(url);
            return res.json();
        }
        
        async function apiPost(url, data) {
            if (!csrfToken) await fetchCsrfToken();
            const res = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify(data),
                credentials: 'include'
            });
            return res.json();
        }
        
        async function apiPut(url, data) {
            if (!csrfToken) await fetchCsrfToken();
            const res = await fetch(url, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify(data),
                credentials: 'include'
            });
            return res.json();
        }

        // ========== ARBORESCENCE ==========
        async function chargerArborescence() {
            try {
                const data = await apiGet('/api/dossiers/');
                arborescence = data;
                afficherArborescence();
            } catch (error) {
                document.getElementById('tree-container').innerHTML = '<div style="padding:12px;">Erreur de chargement</div>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function afficherArborescence() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            function renderTree(items, niveau = 0) {
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `tree-item ${item.type === 'dossier' ? 'folder' : 'file'}`;
                    div.style.paddingLeft = (niveau * 24 + 8) + 'px';
                    div.innerHTML = `<i class="icon fas ${item.type === 'dossier' ? 'fa-folder' : 'fa-file'}"></i><span class="label">${escapeHtml(item.nom)}</span>`;
                    if (item.type === 'dossier') div.addEventListener('click', () => selectDossier(item));
                    else div.addEventListener('click', () => selectFichier(item));
                    container.appendChild(div);
                    if (item.enfants) renderTree(item.enfants, niveau + 1);
                });
            }
            renderTree(arborescence);
        }

        async function selectDossier(dossier) {
            currentDossier = dossier;
            currentFichier = null;
            document.getElementById('file-title').innerHTML = `<i class="fas fa-folder"></i><span>${escapeHtml(dossier.nom)}</span>`;
            document.getElementById('workspace').innerHTML = `<div class="empty-editor"><i class="fas fa-folder-open"></i><p>Dossier: ${escapeHtml(dossier.nom)}<br>Créez un fichier</p></div>`;
        }

        async function selectFichier(fichier) {
            currentFichier = fichier;
            currentDossier = null;
            document.getElementById('file-title').innerHTML = `<i class="fas fa-file"></i><span>${escapeHtml(fichier.nom)}</span>`;
            try {
                const data = await apiGet(`/api/fichiers/${fichier.id}/`);
                renderDocument(data.contenu || { blocks: [] }, document.getElementById('workspace'));
            } catch (error) {
                console.error('Erreur chargement fichier:', error);
            }
        }

        async function creerDossier() {
            const nom = document.getElementById('dossier-nom').value.trim();
            if (!nom) return;
            const res = await apiPost('/api/dossiers/', { nom, parent: currentDossier?.id || null });
            if (res.id) {
                document.getElementById('modal-dossier').style.display = 'none';
                document.getElementById('dossier-nom').value = '';
                await chargerArborescence();
            } else {
                console.error('Erreur:', res);
                alert('Erreur: ' + (res.detail || 'Impossible de créer le dossier'));
            }
        }

        async function creerFichier() {
            const nom = document.getElementById('fichier-nom').value.trim();
            if (!nom) return;
            const res = await apiPost('/api/fichiers/', { nom, dossier: currentDossier?.id || null, contenu: { blocks: [] } });
            if (res.id) {
                document.getElementById('modal-fichier').style.display = 'none';
                document.getElementById('fichier-nom').value = '';
                await chargerArborescence();
                if (res && res.id) await selectFichier(res);
            } else {
                console.error('Erreur:', res);
                alert('Erreur: ' + (res.detail || 'Impossible de créer le fichier'));
            }
        }

        async function sauvegarder() {
            if (!currentFichier) { alert('Aucun fichier ouvert'); return; }
            const syncedState = syncBlocksFromDOM();
            await apiPut(`/api/fichiers/${currentFichier.id}/`, { contenu: syncedState });
            alert('✅ Fichier sauvegardé');
        }

        // ========== ÉVÉNEMENTS ==========
        document.getElementById('btn-new-dossier').onclick = () => document.getElementById('modal-dossier').style.display = 'flex';
        document.getElementById('btn-new-fichier').onclick = () => document.getElementById('modal-fichier').style.display = 'flex';
        document.getElementById('btn-save').onclick = sauvegarder;
        document.getElementById('cancel-dossier').onclick = () => document.getElementById('modal-dossier').style.display = 'none';
        document.getElementById('confirm-dossier').onclick = creerDossier;
        document.getElementById('cancel-fichier').onclick = () => document.getElementById('modal-fichier').style.display = 'none';
        document.getElementById('confirm-fichier').onclick = creerFichier;

        // ========== DÉMARRAGE ==========
        await fetchCsrfToken();
        chargerArborescence();
    </script>
</body>
</html>
